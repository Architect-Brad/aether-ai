<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AETHER Golden Paths</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #0a0a0f; color: #cde; padding: 24px; }
    h1 { color: #00f3ff; font-size: 1.1rem; }
    .ok { color: #1d9e75; } .fail { color: #e24b4a; }
    pre { background: #12121a; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
  <script src="../core/version.js"></script>
  <script src="../core/skill-utils.js"></script>
  <script src="../core/aether-skills-pack.js"></script>
  <script src="../core/aether-skill-runtime.js"></script>
  <script src="../core/aether-deep-research.js"></script>
  <script src="../core/aether-security.js"></script>
  <script src="../core/ghost-commits.js"></script>
  <script src="../core/aether-moat.js"></script>
  <script src="../core/aether-ship.js"></script>
</head>
<body>
  <h1>AETHER Golden Paths</h1>
  <p id="summary">Running…</p>
  <pre id="out"></pre>
  <script>
    window.AETHER_SKILLS = window.AETHER_SKILLS || {};
    if (window.AETHER_SkillsPack) {
      window.AETHER_SkillsPack.mergeIntoRegistry(window.AETHER_SKILLS);
    }
    // minimal stubs
    window.AETHER_Ghost = window.AETHER_Ghost || { propose: function (x) { return x; }, loadQueue: function () { return []; }, render: function () {} };
    window.AETHER_CodePro = window.AETHER_CodePro || { listCheckpoints: function () { return []; }, getTouched: function () { return []; } };
    window.AETHER_ChangeSet = window.AETHER_ChangeSet || { createFromPending: function () { return null; } };
    window.AETHER_RAGv2 = window.AETHER_RAGv2 || { stats: function () { return { chunks: 0 }; } };
    window.AETHER_ToolRuntime = window.AETHER_ToolRuntime || {};
    window.AETHER_Kernel = window.AETHER_Kernel || { log: function () {}, on: function () {} };
    if (window.AETHER_Moat) window.AETHER_Moat.installHooks();
    var r = window.AETHER_Ship.runGoldenPaths();
    document.getElementById('summary').innerHTML =
      '<span class="' + (r.ok ? 'ok' : 'fail') + '">' +
      (r.ok ? 'PASS' : 'FAIL') + '</span> · ' + r.passed + '/' + r.total + ' · ship v' + window.AETHER_Ship.version;
    document.getElementById('out').textContent = r.results.map(function (x) {
      return (x.pass ? '✓' : '✗') + ' ' + x.name + (x.detail ? ' — ' + x.detail : '');
    }).join('\n');
  </script>
</body>
</html>
