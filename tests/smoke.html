<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AETHER Smoke Tests</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #020308; color: #c8d8e8; padding: 24px; }
    h1 { color: #00f3ff; font-size: 1.1rem; letter-spacing: 0.08em; }
    .pass { color: #00ff88; }
    .fail { color: #ff4466; }
    .row { padding: 4px 0; border-bottom: 1px solid #112; font-size: 0.82rem; }
    #summary { margin-top: 16px; font-weight: 700; }
  </style>
</head>
<body>
  <h1>⬡ AETHER SMOKE</h1>
  <div id="out"></div>
  <div id="summary"></div>

  <script src="../core/version.js"></script>
  <script src="../core/safe-math.js"></script>
  <script src="../core/capabilities.js"></script>
  <script src="../core/beast-mode.js"></script>
  <script src="../core/aether-markdown.js"></script>
  <script src="../core/aether-tool-runtime.js"></script>
  <script src="../core/aether-ship.js"></script>
  <script>
    const out = document.getElementById('out');
    let pass = 0, fail = 0;

    function assert(name, cond, detail) {
      const ok = !!cond;
      if (ok) pass++; else fail++;
      const div = document.createElement('div');
      div.className = 'row ' + (ok ? 'pass' : 'fail');
      div.textContent = (ok ? '✓ ' : '✗ ') + name + (detail ? ' — ' + detail : '');
      out.appendChild(div);
    }

    // Version (pin to core/version.js — never hardcode outdated expected)
    assert('AETHER_VERSION set', !!window.AETHER_VERSION && /^\d+\.\d+/.test(window.AETHER_VERSION), window.AETHER_VERSION);
    assert('AETHER_CODENAME set', !!(window.AETHER_CODENAME && window.AETHER_CODENAME.length > 2), window.AETHER_CODENAME);
    assert('AETHER_VERSION_LABEL', window.AETHER_VERSION_LABEL === 'v' + window.AETHER_VERSION);
    assert('AETHER_META present', !!(window.AETHER_META && window.AETHER_META.license));

    // Safe math
    assert('safeCalculate exists', typeof AETHER_safeCalculate === 'function');
    assert('2+2', AETHER_safeCalculate('2+2') === '4', AETHER_safeCalculate('2+2'));
    assert('order of ops', AETHER_safeCalculate('2+3*4') === '14', AETHER_safeCalculate('2+3*4'));
    assert('parens', AETHER_safeCalculate('(2+3)*4') === '20', AETHER_safeCalculate('(2+3)*4'));
    assert('power', AETHER_safeCalculate('2^10') === '1024', AETHER_safeCalculate('2^10'));
    assert('rejects injection', /Error|unsupported/i.test(AETHER_safeCalculate('alert(1)')), AETHER_safeCalculate('alert(1)'));
    assert('rejects letters', /Error|unsupported/i.test(AETHER_safeCalculate('foo()')), AETHER_safeCalculate('foo()'));

    // Beast mode API
    assert('AETHER_Beast API', !!(window.AETHER_Beast && AETHER_Beast.toggle && AETHER_Beast.systemPromptAddon));
    localStorage.removeItem(AETHER_Beast.STORAGE_KEY);
    assert('beast starts off', AETHER_Beast.isEnabled() === false);
    AETHER_Beast.set(true, { state: { beastMode: false, deepResearchSettings: {} }, saveState: () => {}, showNotification: () => {} });
    assert('beast enables', AETHER_Beast.isEnabled() === true);
    assert('beast prompt non-empty', AETHER_Beast.systemPromptAddon().includes('BEAST MODE'));
    AETHER_Beast.set(false, { state: { beastMode: true }, saveState: () => {}, showNotification: () => {} });
    assert('beast disables', AETHER_Beast.isEnabled() === false);
    assert('beast prompt empty when off', AETHER_Beast.systemPromptAddon() === '');

    // Markdown + tools + ship
    assert('Markdown engine', !!(window.AETHER_Markdown && AETHER_Markdown.runGoldenFixtures));
    if (window.AETHER_Markdown) {
      const md = AETHER_Markdown.runGoldenFixtures();
      assert('markdown golden', md.ok, md.passed + '/' + md.total);
    }
    assert('Tool runtime', !!(window.AETHER_ToolRuntime && AETHER_ToolRuntime.runGoldenSuite));
    if (window.AETHER_ToolRuntime) {
      const tools = AETHER_ToolRuntime.runGoldenSuite({});
      assert('tools golden', tools.ok, tools.passed + '/' + tools.total);
    }
    assert('Ship layer', !!(window.AETHER_Ship && AETHER_Ship.runShipCheck));
    if (window.AETHER_Ship && AETHER_Ship.runShipCheck) {
      // soft stubs so modules section can pass in isolation
      window.AETHER_Ghost = window.AETHER_Ghost || { accept: async () => ({ ok: true }) };
      window.AETHER_RAGv2 = window.AETHER_RAGv2 || { indexFolder: async () => ({ ok: true }) };
      window.AETHER_Moat = window.AETHER_Moat || {};
      window.AETHER_CodePro = window.AETHER_CodePro || { listCheckpoints: () => [] };
      window.AETHER_ChangeSet = window.AETHER_ChangeSet || { createFromPending: () => null };
      const sc = AETHER_Ship.runShipCheck({});
      assert('shipcheck runs', !!sc && typeof sc.ok === 'boolean', sc && sc.sections ? sc.sections.map(s => s.name + ':' + s.passed + '/' + s.total).join(' ') : '');
    }

    // Capabilities probe
    assert('probe exists', typeof AETHER_probeCapabilities === 'function');
    const report = AETHER_probeCapabilities();
    assert('probe returns results', Array.isArray(report.results) && report.results.length > 0);

    // Packaging files (fetch relative — only works when served over HTTP)
    Promise.all([
      fetch('../manifest.json').then(r => ({ name: 'manifest.json', ok: r.ok, json: r.ok ? r.json() : null })).catch(() => ({ name: 'manifest.json', ok: false })),
      fetch('../logo.svg').then(r => ({ name: 'logo.svg', ok: r.ok })).catch(() => ({ name: 'logo.svg', ok: false })),
      fetch('../sw.js').then(r => r.text()).then(t => ({
        name: 'sw.js cache matches version',
        ok: t.includes('aether-v' + window.AETHER_VERSION),
      })).catch(() => ({ name: 'sw.js', ok: false })),
      fetch('../core/version.js').then(r => ({ name: 'core/version.js', ok: r.ok })).catch(() => ({ name: 'core/version.js', ok: false })),
      fetch('../scripts/shipcheck.mjs').then(r => ({ name: 'scripts/shipcheck.mjs', ok: r.ok })).catch(() => ({ name: 'scripts/shipcheck.mjs', ok: false })),
    ]).then(async results => {
      for (const r of results) {
        if (r.json) {
          const j = await r.json;
          assert(r.name + ' fetch', r.ok);
          if (j) assert('manifest version matches', j.version === window.AETHER_VERSION, j.version + ' vs ' + window.AETHER_VERSION);
        } else {
          assert(r.name, r.ok);
        }
      }
      finish();
    }).catch(finish);

    function finish() {
      const el = document.getElementById('summary');
      el.className = fail ? 'fail' : 'pass';
      el.textContent = (fail ? 'FAIL' : 'PASS') + ' · ' + pass + ' passed · ' + fail + ' failed · product v' + window.AETHER_VERSION;
      document.title = (fail ? 'FAIL' : 'PASS') + ' · AETHER smoke';
    }
  </script>
</body>
</html>
